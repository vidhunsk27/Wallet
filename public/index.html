<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wallet V2.0 - Master Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f3f4f6; -webkit-overflow-scrolling: touch; }
    .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
    .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; -webkit-appearance: none; }
    .glass-input:focus { border-color: #3b82f6; outline: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; } 
    ::-webkit-scrollbar-track { background: transparent; } 
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }
    .view-hidden { display: none; } 
    .view-active { display: block; animation: fadeSlideUp 0.4s ease-out forwards; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .ai-typing { border-right: 2px solid #3b82f6; white-space: pre-wrap; overflow: hidden; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { border-color: transparent; } }
    .ledger-item .action-btn { opacity: 1; transform: scale(1); }
    @media (min-width: 768px) { .ledger-item .action-btn { opacity: 0; transform: scale(0.8); transition: all 0.2s; } .ledger-item:hover .action-btn { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="p-3 md:p-8 min-h-screen pb-24">

  <div class="fixed top-0 left-1/4 w-72 md:w-96 h-72 md:h-96 bg-blue-600/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
  <div class="fixed bottom-0 right-1/4 w-72 md:w-96 h-72 md:h-96 bg-purple-600/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>

  <div class="max-w-7xl mx-auto space-y-4 md:space-y-6">
    
    <header class="flex flex-col sm:flex-row justify-between items-center gap-4 glass-panel rounded-3xl p-4 px-6">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20"><i data-lucide="layers" class="text-white w-5 h-5"></i></div>
        <h1 class="text-xl font-black tracking-tight text-white">Wallet<span class="text-blue-400">V2.0</span></h1>
      </div>
      <div class="flex space-x-1 bg-black/40 p-1 rounded-2xl border border-white/5 w-full sm:w-auto">
        <button id="navDashboard" onclick="switchMainView('dashboard')" class="flex-1 sm:flex-none px-4 md:px-5 py-2.5 rounded-xl font-bold text-sm bg-white/10 text-white shadow-sm transition-all"><i data-lucide="activity" class="inline w-4 h-4 mr-1.5"></i> Ledger</button>
        <button id="navWishlist" onclick="switchMainView('wishlist')" class="flex-1 sm:flex-none px-4 md:px-5 py-2.5 rounded-xl font-bold text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-all"><i data-lucide="target" class="inline w-4 h-4 mr-1.5"></i> Wishlist</button>
      </div>
    </header>

    <div id="viewDashboard" class="view-active space-y-4 md:space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
        <div class="glass-panel rounded-3xl p-6 md:p-8 relative overflow-hidden group">
          <div class="absolute inset-0 bg-gradient-to-br from-blue-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 flex items-center"><div class="w-2 h-2 rounded-full bg-blue-500 mr-2 animate-pulse"></div> Total Assets</h3>
          <h1 id="netBalance" class="text-4xl md:text-5xl font-black text-white mt-2 drop-shadow-md">₹0</h1>
          <div class="mt-6 md:mt-8 grid grid-cols-3 gap-2 md:gap-4 text-xs md:text-sm font-medium border-t border-white/10 pt-4 md:pt-6">
            <div><p class="text-gray-500 text-[10px] md:text-xs mb-1">UPI</p><p id="balUPI" class="text-white font-bold">₹0</p></div>
            <div><p class="text-gray-500 text-[10px] md:text-xs mb-1">Card</p><p id="balCard" class="text-white font-bold">₹0</p></div>
            <div><p class="text-gray-500 text-[10px] md:text-xs mb-1">Cash</p><p id="balCash" class="text-white font-bold">₹0</p></div>
          </div>
        </div>

        <div class="glass-panel rounded-3xl p-6 md:p-8 flex flex-col justify-center">
          <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Total Income</h3>
          <h2 id="totalIncome" class="text-3xl md:text-4xl font-black text-emerald-400 mt-2">₹0</h2>
        </div>

        <div class="glass-panel rounded-3xl p-6 md:p-8 flex flex-col justify-center">
          <div class="flex justify-between items-start">
            <div><h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Total Expenses</h3><h2 id="totalExpense" class="text-3xl md:text-4xl font-black text-rose-400 mt-2">₹0</h2></div>
            <button onclick="setGoal()" class="text-white/30 hover:text-white transition-colors p-1" title="Set Budget"><i data-lucide="settings-2" class="w-5 h-5"></i></button>
          </div>
          <div class="mt-4 md:mt-6 w-full bg-black/50 rounded-full h-2 border border-white/5"><div id="goalProgress" class="bg-gradient-to-r from-rose-500 to-orange-400 h-2 rounded-full transition-all duration-1000" style="width: 0%"></div></div>
          <p id="goalText" class="text-xs text-gray-500 mt-3 text-right">Budget: ₹0</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
        <div class="lg:col-span-2 space-y-4 md:space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            <div class="glass-panel rounded-3xl p-5 md:p-6 flex flex-col">
              <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Analytics</h3>
                <button onclick="getAIInsights()" id="aiButton" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all border border-blue-500/30 flex items-center">
                  <i data-lucide="sparkles" class="w-3 h-3 mr-1"></i> Jarvis AI
                </button>
              </div>
              <div id="aiTerminal" class="hidden mb-4 p-4 bg-black/60 border border-blue-500/30 rounded-xl text-xs md:text-sm text-gray-300 min-h-[80px]"></div>
              <div class="h-44 md:h-48 relative flex items-center justify-center"><canvas id="walletChart"></canvas><div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pt-2"><span class="text-gray-400 text-[9px] font-semibold mb-0.5 uppercase tracking-widest">Spent</span><span id="chartCenterText" class="text-lg md:text-xl font-bold text-white">₹0</span></div></div>
              <div id="topInsights" class="mt-4 space-y-3 pt-4 border-t border-white/10 flex-grow"></div>
            </div>
            <div class="glass-panel rounded-3xl p-5 md:p-6">
              <h3 class="text-sm font-bold text-gray-300 mb-6 uppercase tracking-widest">Cash Flow</h3>
              <div class="h-60 md:h-64"><canvas id="trendChart"></canvas></div>
            </div>
          </div>

          <div class="glass-panel rounded-3xl p-4 md:p-6">
            <div class="flex flex-col gap-4 mb-6">
               <div class="flex justify-between items-center">
                 <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest flex items-center">Ledger<span id="recordCount" class="ml-3 px-2 py-0.5 bg-white/10 rounded-md text-xs text-white">0</span></h3>
                 <div class="flex items-center space-x-1.5">
                   <button onclick="exportData()" class="bg-white/5 hover:bg-white/10 text-gray-300 p-2 rounded-xl border border-white/5" title="Backup (JSON)"><i data-lucide="download" class="w-4 h-4"></i></button>
                   <label class="bg-white/5 hover:bg-white/10 text-gray-300 p-2 rounded-xl border border-white/5 cursor-pointer" title="Restore (JSON)"><i data-lucide="upload" class="w-4 h-4"></i><input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)"></label>
                   <a href="http://localhost:3000/generate-pdf" download class="bg-white/5 hover:bg-white/10 text-rose-400 p-2 rounded-xl border border-white/5" title="Download PDF Statement"><i data-lucide="file-text" class="w-4 h-4"></i></a>
                 </div>
               </div>
               <div class="flex space-x-2">
                 <select id="monthFilter" class="glass-input rounded-xl py-2 px-3 text-sm text-white flex-1 max-w-[130px]"></select>
                 <div class="relative flex-grow"><i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-500"></i><input type="text" id="searchInput" placeholder="Search parameters..." class="w-full glass-input rounded-xl py-2 pl-9 pr-3 text-sm text-white" /></div>
               </div>
            </div>
            <div id="ledgerList" class="space-y-2 max-h-[350px] md:max-h-[400px] overflow-y-auto pr-1 touch-pan-y"></div>
          </div>
        </div>

        <div class="lg:col-span-1">
          <div class="glass-panel rounded-3xl p-5 md:p-6 sticky top-6">
            <h3 class="text-sm font-bold text-gray-300 mb-6 uppercase tracking-widest">Quick Entry</h3>
            <div class="flex rounded-xl bg-black/40 p-1 mb-6 border border-white/5">
              <button id="tabExpense" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white/10 text-white transition-all" onclick="switchTab('expense')">Expense</button>
              <button id="tabIncome" class="flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-white transition-all" onclick="switchTab('income')">Income</button>
            </div>

            <form id="transactionForm" class="space-y-4 md:space-y-5">
              <div>
                <div class="relative flex items-center">
                  <span id="currencySymbol" class="absolute left-4 text-2xl font-bold text-rose-500">₹</span>
                  <input type="number" id="amount" placeholder="0.00" step="0.01" required class="w-full glass-input rounded-2xl py-5 pl-12 pr-24 text-3xl font-black text-white" />
                  
                  <button type="button" onclick="handleSMSPaste()" class="absolute right-14 p-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg transition-colors" title="Paste Transaction SMS">
                    <i id="smsIcon" data-lucide="message-square" class="w-5 h-5"></i>
                  </button>
                  
                  <label for="receiptUpload" class="absolute right-4 p-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg cursor-pointer transition-colors" title="Scan Receipt/PDF">
                    <i id="scanIcon" data-lucide="camera" class="w-5 h-5"></i>
                  </label>
                  <input type="file" id="receiptUpload" accept="image/*,application/pdf" class="hidden" onchange="scanReceipt(event)">
                </div>
                <div class="flex gap-1.5 mt-3 overflow-x-auto pb-1 touch-pan-x">
                  <button type="button" onclick="addAmount(100)" class="flex-1 min-w-[55px] bg-white/5 hover:bg-white/10 text-gray-300 text-xs font-bold py-2 rounded-lg border border-white/5">+100</button>
                  <button type="button" onclick="addAmount(500)" class="flex-1 min-w-[55px] bg-white/5 hover:bg-white/10 text-gray-300 text-xs font-bold py-2 rounded-lg border border-white/5">+500</button>
                  <button type="button" onclick="addAmount(1000)" class="flex-1 min-w-[55px] bg-white/5 hover:bg-white/10 text-gray-300 text-xs font-bold py-2 rounded-lg border border-white/5">+1k</button>
                  <button type="button" onclick="addAmount(5000)" class="flex-1 min-w-[55px] bg-white/5 hover:bg-white/10 text-gray-300 text-xs font-bold py-2 rounded-lg border border-white/5">+5k</button>
                </div>
              </div>
              
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2 pl-1">Category</label>
                  <select id="category" class="w-full glass-input rounded-xl p-3.5 text-sm text-white"></select>
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2 pl-1">Account</label>
                  <select id="account" class="w-full glass-input rounded-xl p-3.5 text-sm text-white">
                    <option value="UPI">📱 UPI</option><option value="Card">💳 Card</option><option value="Cash">💵 Cash</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2 pl-1">Date</label>
                <input type="date" id="date" required class="w-full glass-input rounded-xl p-3.5 text-sm text-white" />
              </div>
              
              <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2 pl-1">Description</label>
                <input type="text" id="note" placeholder="Transaction context info..." class="w-full glass-input rounded-xl p-3.5 text-sm text-white" />
              </div>

              <div id="recurringToggleDiv" class="flex items-center justify-between p-4 bg-black/40 rounded-xl border border-white/5">
                <div class="flex items-center"><i data-lucide="repeat" class="w-4 h-4 text-blue-400 mr-2"></i><span class="text-xs font-bold text-gray-300 uppercase tracking-widest">Auto-Renew Monthly</span></div>
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" id="isRecurring" class="sr-only peer">
                  <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                </label>
              </div>
              
              <button id="submitBtn" type="submit" class="w-full mt-4 bg-gradient-to-r from-rose-600 to-rose-500 hover:from-rose-500 hover:to-rose-400 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-rose-500/25 active:scale-[0.98]">Add Transaction</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="viewWishlist" class="view-hidden space-y-4 md:space-y-6">
      <div class="glass-panel rounded-3xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div><h2 class="text-2xl md:text-3xl font-black text-white flex items-center"><i data-lucide="rocket" class="text-blue-400 mr-4 w-7 h-7"></i> Target Goals</h2><p class="text-gray-400 text-xs md:text-sm mt-1.5">Captured via automation hooks or items added manually below.</p></div>
        <div class="flex items-center space-x-3 w-full md:w-auto bg-black/40 p-2 rounded-2xl border border-white/5">
          <div class="px-3 md:px-4 py-2 text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest border-r border-white/10">Savings Plan</div>
          <div class="relative w-full md:w-36"><span class="absolute left-2 top-1/2 transform -translate-y-1/2 text-emerald-400 font-bold text-sm">₹</span>
            <input type="number" id="wishlistSavingsInput" placeholder="0" class="w-full bg-transparent py-1.5 pl-6 pr-2 text-base md:text-lg font-bold text-white focus:outline-none" onchange="updateWishlistSavings(this.value)" />
          </div><span class="text-gray-500 text-xs pr-3">/ mo</span>
        </div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
        <div class="lg:col-span-1"><div class="glass-panel rounded-3xl p-5 md:p-6 sticky top-6"><h3 class="text-sm font-bold text-gray-300 mb-6 uppercase tracking-widest">Auto-Fetch Item</h3><form id="wishlistForm" class="space-y-4"><div class="relative"><input type="url" id="wishLink" placeholder="Paste product URL link..." class="w-full glass-input rounded-xl p-4 pr-10 text-sm text-white" /><i id="linkStatusIcon" data-lucide="link" class="absolute right-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-500"></i></div><input type="text" id="wishName" placeholder="Product Name Target" required class="w-full glass-input rounded-xl p-4 text-sm text-white" /><input type="number" id="wishPrice" placeholder="Price Matrix (₹)" required class="w-full glass-input rounded-xl p-4 text-sm text-white" /><input type="url" id="wishImage" placeholder="Image Resource Address" class="w-full glass-input rounded-xl p-4 text-sm text-white" /><button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/25">Save to Tracker</button></form></div></div>
        <div class="lg:col-span-2"><div id="wishlistGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6"></div></div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // NOTE: Change this to your Render/Railway live backend URL once hosted!
    const API_BASE = 'http://localhost:3000';

    let currentType = 'expense'; let expenseGoal = parseFloat(localStorage.getItem('walletGoal')) || 25000; let selectedMonth = 'all'; let searchQuery = '';
    let transactions = []; let wishlistItems = []; let monthlyWishlistSavings = parseFloat(localStorage.getItem('walletWishlistSavings')) || 0;
    let aiTypingTimer;

    document.getElementById('wishlistSavingsInput').value = monthlyWishlistSavings || '';

    const EXPENSE_CATEGORIES = ['Food & Dining', 'Groceries', 'Transport', 'Utilities', 'Shopping', 'Entertainment', 'Health', 'Subscriptions', 'Other'];
    const INCOME_CATEGORIES = ['Salary', 'Freelance', 'Investments', 'Refund', 'Other'];
    const CAT_COLORS = { 'Food & Dining': '#ef4444', 'Groceries': '#f97316', 'Subscriptions': '#8b5cf6', 'Transport': '#3b82f6', 'Utilities': '#eab308', 'Shopping': '#a855f7', 'Salary': '#10b981', 'Other': '#6b7280' };

    async function syncDataFromServer() {
        try {
            const localData = localStorage.getItem('walletData');
            if (localData && JSON.parse(localData).length > 0) {
                await fetch(`${API_BASE}/sync-transactions`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: localData });
                localStorage.removeItem('walletData'); 
            }
            const [txRes, wRes] = await Promise.all([ fetch(`${API_BASE}/get-transactions`), fetch(`${API_BASE}/get-wishlist`) ]);
            transactions = await txRes.json(); wishlistItems = await wRes.json();
            updateUI(); renderWishlist();
        } catch (err) { console.error("Could not fetch from Cloud DB. Ensure server is running."); }
    }

    function switchMainView(view) {
      document.getElementById('viewDashboard').className = view === 'dashboard' ? 'view-active space-y-4 md:space-y-6' : 'view-hidden';
      document.getElementById('viewWishlist').className = view === 'wishlist' ? 'view-active space-y-4 md:space-y-6' : 'view-hidden';
      const dBtn = document.getElementById('navDashboard'); const wBtn = document.getElementById('navWishlist');
      if (view === 'dashboard') {
          dBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2.5 rounded-xl font-bold text-sm bg-white/10 text-white shadow-sm transition-all';
          wBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2.5 rounded-xl font-bold text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-all';
      } else {
          wBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2.5 rounded-xl font-bold text-sm bg-blue-600/80 text-white shadow-sm transition-all border border-blue-500/50';
          dBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2.5 rounded-xl font-bold text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-all';
      }
    }

    function switchTab(type) {
      currentType = type;
      document.getElementById('recurringToggleDiv').style.display = type === 'expense' ? 'flex' : 'none';
      document.getElementById('tabExpense').className = `flex-1 py-2 text-sm font-bold rounded-lg transition-all ${type === 'expense' ? 'bg-white/10 text-white' : 'text-gray-500 hover:text-white'}`;
      document.getElementById('tabIncome').className = `flex-1 py-2 text-sm font-bold rounded-lg transition-all ${type === 'income' ? 'bg-white/10 text-white' : 'text-gray-500 hover:text-white'}`;
      document.getElementById('currencySymbol').className = `absolute left-4 text-2xl font-bold ${type === 'expense' ? 'text-rose-500' : 'text-emerald-500'}`;
      document.getElementById('submitBtn').className = `w-full mt-4 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-[0.98] ${type === 'expense' ? 'bg-gradient-to-r from-rose-600 to-rose-500 shadow-rose-500/25' : 'bg-gradient-to-r from-emerald-600 to-emerald-500 shadow-emerald-500/25'}`;
      populateCategories();
    }

    function populateCategories() {
      const sel = document.getElementById('category'); sel.innerHTML = '';
      (currentType === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES).forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function setGoal() {
      const g = prompt("Set Budget Constraint (₹):", expenseGoal);
      if (g && !isNaN(g)) { expenseGoal = parseFloat(g); localStorage.setItem('walletGoal', expenseGoal); updateUI(); }
    }

    function addAmount(val) { document.getElementById('amount').value = (parseFloat(document.getElementById('amount').value) || 0) + val; }

    function populateMonthFilter() {
      const filter = document.getElementById('monthFilter'); const months = new Set();
      transactions.forEach(t => { const d = new Date(t.timestamp); months.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`); });
      const sortedMonths = Array.from(months).sort().reverse(); const currentVal = filter.value;
      filter.innerHTML = '<option value="all">All Time</option>';
      sortedMonths.forEach(m => { const [y, mo] = m.split('-'); filter.innerHTML += `<option value="${m}">${new Date(y, mo - 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })}</option>`; });
      if (Array.from(filter.options).some(o => o.value === currentVal)) filter.value = currentVal;
    }

    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ transactions, wishlist: wishlistItems, goal: expenseGoal, savings: monthlyWishlistSavings }));
      const link = document.createElement("a"); link.href = dataStr; link.download = "wallet_v2_backup.json"; document.body.appendChild(link); link.click(); link.remove();
    }

    function importData(event) {
      const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.transactions) {
            await fetch(`${API_BASE}/sync-transactions`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(imported.transactions) });
            expenseGoal = imported.goal || 25000; monthlyWishlistSavings = imported.savings || 0;
            localStorage.setItem('walletGoal', expenseGoal); localStorage.setItem('walletWishlistSavings', monthlyWishlistSavings);
            document.getElementById('wishlistSavingsInput').value = monthlyWishlistSavings || '';
            alert("Data records synced to cloud successfully!"); syncDataFromServer();
          }
        } catch (err) { alert("Corrupted parsing sequence on target database file."); }
      }; reader.readAsText(file);
    }

    async function scanReceipt(event) {
        const file = event.target.files[0]; if (!file) return;
        const icon = document.getElementById('scanIcon'); icon.setAttribute('data-lucide', 'loader-2'); icon.classList.add('animate-spin'); lucide.createIcons();
        const formData = new FormData(); formData.append('receipt', file);
        try {
            const res = await fetch(`${API_BASE}/scan-receipt`, { method: 'POST', body: formData });
            const data = await res.json();
            if (data.total > 0) { document.getElementById('amount').value = data.total; document.getElementById('note').value = 'Document Scan Data Extraction'; } 
            else { alert("Total value key parameters undetected inside asset frame."); }
        } catch (error) { alert("OCR Engine communication layer error."); } 
        finally { icon.setAttribute('data-lucide', 'camera'); icon.classList.remove('animate-spin'); lucide.createIcons(); event.target.value = ''; }
    }

    async function handleSMSPaste() {
        const smsText = prompt("Paste raw transaction info SMS body structure here:");
        if (!smsText) return;

        const icon = document.getElementById('smsIcon');
        icon.setAttribute('data-lucide', 'loader-2'); icon.classList.add('animate-spin'); lucide.createIcons();

        try {
            const res = await fetch(`${API_BASE}/parse-sms`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sms: smsText })
            });
            const result = await res.json();

            if (result.status === 'success') {
                const data = result.data;
                if (data.type === 'expense' || data.type === 'income') switchTab(data.type);
                
                document.getElementById('amount').value = data.amount;
                document.getElementById('note').value = data.note;
                
                const accDropdown = document.getElementById('account');
                for(let i=0; i < accDropdown.options.length; i++) {
                    if(accDropdown.options[i].value === data.account) {
                        accDropdown.selectedIndex = i; break;
                    }
                }
            } else { alert("Failed parsing text details via AI engine."); }
        } catch (error) { alert("Connection timeout on Gemini parsing node."); } 
        finally { icon.setAttribute('data-lucide', 'message-square'); icon.classList.remove('animate-spin'); lucide.createIcons(); }
    }

    async function getAIInsights() {
        const term = document.getElementById('aiTerminal'); const btn = document.getElementById('aiButton');
        btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');
        clearTimeout(aiTypingTimer);
        term.classList.remove('hidden');
        term.innerHTML = '<span class="text-blue-400 animate-pulse">Jarvis is compiling budget logs...</span>';
        
        try {
            const res = await fetch(`${API_BASE}/ai-insights`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ transactions: transactions, goal: expenseGoal }) });
            const data = await res.json(); 
            term.innerHTML = ''; let i = 0; const txt = data.message; term.classList.add('ai-typing');
            function typeWriter() { 
                if (i < txt.length) { term.innerHTML += txt.charAt(i); i++; aiTypingTimer = setTimeout(typeWriter, 20); } 
                else { term.classList.remove('ai-typing'); btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed'); } 
            }
            typeWriter();
        } catch (err) { 
            term.innerHTML = '<span class="text-red-400">Analysis stream offline. Verification required for Gemini parameters.</span>'; 
            btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }

    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
        e.preventDefault(); const amt = parseFloat(document.getElementById('amount').value); if (!amt) return;
        const dateObj = new Date(document.getElementById('date').value); const now = new Date(); dateObj.setHours(now.getHours(), now.getMinutes());
        const newTx = { id: String(Date.now()), type: currentType, amount: amt, account: document.getElementById('account').value, category: document.getElementById('category').value, note: document.getElementById('note').value, timestamp: dateObj.getTime(), isRecurring: document.getElementById('isRecurring')?.checked };
        await fetch(`${API_BASE}/add-transaction`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newTx) });
        document.getElementById('amount').value = ''; document.getElementById('note').value = ''; if(document.getElementById('isRecurring')) document.getElementById('isRecurring').checked = false; syncDataFromServer();
    });

    async function deleteTx(id) { if(confirm("Confirm entry deletion?")) { await fetch(`${API_BASE}/delete-transaction/${id}`, { method: 'DELETE' }); syncDataFromServer(); } }

    function updateWishlistSavings(v) { monthlyWishlistSavings = parseFloat(v) || 0; localStorage.setItem('walletWishlistSavings', monthlyWishlistSavings); renderWishlist(); }
    async function deleteWishlistItem(id) { if(confirm("Remove tracking index?")) { await fetch(`${API_BASE}/delete-wishlist/${id}`, { method: 'DELETE' }); syncDataFromServer(); } }

    document.getElementById('wishLink').addEventListener('change', async (e) => {
        const url = e.target.value; const icn = document.getElementById('linkStatusIcon'); if(!url) return;
        icn.setAttribute('data-lucide', 'loader-2'); icn.classList.add('animate-spin'); lucide.createIcons();
        try {
            const res = await fetch(`${API_BASE}/scrape`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url}) });
            const result = await res.json();
            if(result.status === 'success') {
                if(result.data.title) document.getElementById('wishName').value = result.data.title.split('|')[0].trim();
                if(result.data.price) document.getElementById('wishPrice').value = result.data.price;
                if(result.data.imageUrl) document.getElementById('wishImage').value = result.data.imageUrl;
            }
        } catch(err) {} finally { icn.setAttribute('data-lucide', 'link'); icn.classList.remove('animate-spin'); lucide.createIcons(); }
    });

    document.getElementById('wishlistForm').addEventListener('submit', async (e) => {
        e.preventDefault(); const newItem = { id: String(Date.now()), title: document.getElementById('wishName').value, price: parseFloat(document.getElementById('wishPrice').value), link: document.getElementById('wishLink').value, imageUrl: document.getElementById('wishImage').value };
        await fetch(`${API_BASE}/add-wishlist`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newItem) }); e.target.reset(); syncDataFromServer();
    });

    function renderWishlist() {
      const grid = document.getElementById('wishlistGrid');
      if (!wishlistItems.length) { grid.innerHTML = `<p class="text-gray-500 text-sm">No trackable items stored inside current database frame.</p>`; return; }
      grid.innerHTML = [...wishlistItems].reverse().map(item => {
        let actionPlanHTML = '';
        if (monthlyWishlistSavings > 0) {
          const daysNeeded = Math.ceil((item.price / monthlyWishlistSavings) * 30);
          actionPlanHTML = `<div class="mt-4 bg-white/5 rounded-xl p-3 border border-white/5 flex items-center"><i data-lucide="calendar-clock" class="text-blue-400 w-5 h-5 mr-3"></i><div><p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Velocity Strategy Plan</p><p class="text-xs text-gray-300"><span class="font-bold text-blue-400">${daysNeeded} sequential days</span> remaining until lock acquisition.</p></div></div>`;
        }
        const img = item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-40 object-cover rounded-xl mb-4 bg-black/50">` : '';
        return `<div class="glass-panel rounded-3xl p-5 relative group border border-white/5 flex flex-col"><button onclick="deleteWishlistItem('${item.id}')" class="absolute top-3 right-3 bg-red-500/20 text-red-500 p-2 rounded-full opacity-100 md:opacity-0 group-hover:opacity-100 transition-all backdrop-blur-md z-10"><i data-lucide="x" class="w-4 h-4"></i></button>${img}<div class="flex-grow"><h3 class="font-bold text-white leading-tight line-clamp-2">${item.title}</h3><h4 class="text-2xl font-black text-emerald-400 mt-2">₹${item.price.toLocaleString()}</h4></div>${actionPlanHTML}${item.link ? `<a href="${item.link}" target="_blank" class="block w-full text-center mt-4 bg-white/5 hover:bg-white/10 py-2 rounded-xl text-xs font-bold transition-all border border-white/10 text-white">View Online Node</a>` : ''}</div>`;
      }).join(''); lucide.createIcons();
    }

    Chart.defaults.color = '#9ca3af'; Chart.defaults.font.family = 'Inter'; let donutChart, lineChart;

    function initCharts() {
      donutChart = new Chart(document.getElementById('walletChart').getContext('2d'), { type: 'doughnut', data: { labels:[], datasets:[{data:[], backgroundColor:[], borderWidth:0}] }, options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } } });
      lineChart = new Chart(document.getElementById('trendChart').getContext('2d'), { type: 'line', data: { labels:[], datasets:[] }, options: { responsive: true, maintainAspectRatio: false, tension: 0.4, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, border:{display:false} } } } });
    }

    function updateUI() {
      populateMonthFilter(); let tInc = 0, tExp = 0; let bal = { UPI: 0, Card: 0, Cash: 0 };
      const filtered = transactions.filter(t => {
          if (selectedMonth !== 'all') { const d = new Date(t.timestamp); if (`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` !== selectedMonth) return false; }
          if(searchQuery) { const q = searchQuery.toLowerCase(); return t.category.toLowerCase().includes(q) || (t.note && t.note.toLowerCase().includes(q)); }
          return true;
      });

      transactions.forEach(t => { if (t.type === 'income') { if(bal[t.account]!==undefined) bal[t.account] += t.amount; } if (t.type === 'expense') { if(bal[t.account]!==undefined) bal[t.account] -= t.amount; } });
      filtered.forEach(t => { if (t.type === 'income') tInc += t.amount; if (t.type === 'expense') tExp += t.amount; });

      document.getElementById('totalIncome').innerText = `₹${tInc.toLocaleString()}`; document.getElementById('totalExpense').innerText = `₹${tExp.toLocaleString()}`; document.getElementById('chartCenterText').innerText = `₹${tExp.toLocaleString()}`;
      document.getElementById('netBalance').innerText = `₹${(bal.UPI+bal.Card+bal.Cash).toLocaleString()}`; ['UPI', 'Card', 'Cash'].forEach(a => document.getElementById(`bal${a}`).innerText = `₹${bal[a].toLocaleString()}`);

      const pct = Math.min((tExp / expenseGoal) * 100, 100) || 0; document.getElementById('goalProgress').style.width = `${pct}%`; document.getElementById('goalText').innerText = `Target Threshold: ₹${expenseGoal.toLocaleString()} (${Math.round(pct)}%)`;
      document.getElementById('recordCount').innerText = filtered.length;

      const catData = {}; filtered.filter(t=>t.type==='expense').forEach(e => catData[e.category] = (catData[e.category]||0)+e.amount);
      const sCats = Object.entries(catData).sort((a,b)=>b[1]-a[1]);
      donutChart.data = { labels: sCats.map(c=>c[0]), datasets: [{ data: sCats.map(c=>c[1]), backgroundColor: sCats.map(c=>CAT_COLORS[c[0]]||'#6b7280') }] }; donutChart.update();

      const insightsEl = document.getElementById('topInsights');
      if (sCats.length === 0) { insightsEl.innerHTML = `<p class="text-xs text-gray-500 text-center py-2">No category logs processed.</p>`; } 
      else { insightsEl.innerHTML = sCats.slice(0, 3).map(([cat, val]) => { const catPct = Math.round((val / tExp) * 100); return `<div><div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-gray-300 uppercase">${cat}</span><span class="text-gray-400">₹${val.toLocaleString()} (${catPct}%)</span></div><div class="w-full bg-white/5 rounded-full h-1.5"><div class="h-1.5 rounded-full" style="width: ${catPct}%; background-color: ${CAT_COLORS[cat] || '#6b7280'}"></div></div></div>`; }).join(''); }

      const dates = {}; [...filtered].sort((a,b)=>a.timestamp-b.timestamp).slice(-15).forEach(t => { const d = new Date(t.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); if(!dates[d]) dates[d] = {i:0,e:0}; t.type === 'income' ? dates[d].i += t.amount : dates[d].e += t.amount; });
      const labels = Object.keys(dates); lineChart.data = { labels, datasets: [ { data: labels.map(l=>dates[l].i), borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill:true, pointRadius:2 }, { data: labels.map(l=>dates[l].e), borderColor: '#f43f5e', backgroundColor: 'rgba(244, 63, 94, 0.1)', fill:true, pointRadius:2 } ]}; lineChart.update();

      const list = document.getElementById('ledgerList');
      if(!filtered.length) list.innerHTML = `<p class="text-gray-500 text-sm py-4 text-center">No structural entry indexes align with query criteria.</p>`;
      else list.innerHTML = [...filtered].sort((a,b)=>b.timestamp-a.timestamp).map(t => {
          const isI = t.type === 'income';
          return `<div class="ledger-item flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5 mb-2 hover:bg-white/10 transition-colors"><div class="flex items-center space-x-3 md:space-x-4"><div class="w-10 h-10 rounded-full flex items-center justify-center ${isI ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}"><i data-lucide="${isI ? 'arrow-down-left' : 'credit-card'}" class="w-5 h-5"></i></div><div><p class="font-bold text-gray-200 text-sm">${t.category} ${t.isRecurring ? '<span class="bg-blue-600/30 text-blue-400 text-[8px] px-1 ml-1 rounded">AUTO</span>' : ''}</p><p class="text-[10px] text-gray-500 uppercase mt-0.5">${t.account} • ${new Date(t.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</p></div></div><div class="flex items-center space-x-2 md:space-x-3"><div class="text-right"><p class="font-black text-sm md:text-base ${isI ? 'text-emerald-400' : 'text-rose-400'}">${isI?'+':'-'}₹${t.amount.toLocaleString()}</p>${t.note ? `<p class="text-[10px] text-gray-500 truncate max-w-[90px] md:max-w-[120px]">${t.note}</p>`:''}</div><button onclick="deleteTx('${t.id}')" class="action-btn text-gray-500 hover:text-rose-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
      }).join(''); lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', () => { populateCategories(); document.getElementById('date').valueAsDate = new Date(); initCharts(); syncDataFromServer(); document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; updateUI(); }); document.getElementById('monthFilter').addEventListener('change', (e) => { selectedMonth = e.target.value; updateUI(); }); });
  </script>
</body>
</html>
